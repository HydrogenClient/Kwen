<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwen Foundation | 4B LM</title>
    <style>
        /* The "Steve Krueger" Monospace Aesthetic */
        :root {
            --bg-color: #e5e5e5;
            --text-color: #1a1a1a;
            --accent-box: #1a1a1a;
            --accent-text: #ffffff;
            --border-color: #d1d1d1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-weight: normal;
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        h1 strong {
            font-weight: 900;
        }

        p {
            margin-bottom: 1.5rem;
        }

        /* The Highlight Box from the Image */
        .highlight {
            background-color: var(--accent-box);
            color: var(--accent-text);
            padding: 2px 6px;
            font-weight: bold;
        }

        /* Chat Section */
        #chat-window {
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
        }

        .message {
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }

        .kwen-label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        /* The Custom Typing Indicator ▋ */
        .cursor {
            display: inline-block;
            background-color: var(--text-color);
            width: 10px;
            height: 1.2rem;
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Input Area */
        .input-wrapper {
            margin-top: 2rem;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: 1px solid var(--text-color);
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            color: var(--text-color);
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        /* Social Icons Simulation */
        .social-links {
            display: flex;
            gap: 15px;
            margin: 2rem 0;
            font-size: 1.2rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hello. I'm <strong>Kwen</strong>.</h1>
    
    <p>I'm the primary intelligence of the <span class="highlight">Kwen Foundation</span>, 
    an LM built on the Qwen3 architecture.</p>

    <div id="chat-window">
        <div class="message">
            <span class="kwen-label">Kwen:</span>
            <span>Ready for your next instruction.<span class="cursor">▋</span></span>
        </div>
    </div>

    <div class="input-wrapper">
        <input type="text" placeholder="Type your message..">
    </div>
</div>

</body>
</html>
