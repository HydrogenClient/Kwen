<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwen OS</title>
    <style>
        :root {
            --bg-color: #e5e5e5;
            --sidebar-bg: #d8d8d8;
            --text-color: #1a1a1a;
            --accent-box: #1a1a1a;
            --accent-text: #ffffff;
            --border-color: #bbbbbb;
            --code-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 20px 10px;
        }

        .new-chat-btn {
            background: var(--accent-box); color: var(--accent-text);
            border: none; padding: 12px; font-weight: bold; cursor: pointer;
            margin-bottom: 20px; font-family: inherit; font-size: 0.8rem;
        }

        #history-list {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
        }

        .history-item {
            padding: 10px; border: 1px solid transparent; cursor: pointer;
            font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .history-item:hover { border: 1px solid var(--border-color); background: #eee; }
        .history-item.active { background: #fff; border: 1px solid var(--accent-box); }

        /* --- MAIN CHAT --- */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 40px; position: relative; }
        .container { max-width: 900px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100%; }

        h1 { font-weight: normal; font-size: 1.2rem; margin: 0 0 10px 0; letter-spacing: 2px; }
        .highlight { background: var(--accent-box); color: var(--accent-text); padding: 2px 6px; font-size: 0.7rem; font-weight: bold; margin-right: 5px; }

        #chat-window {
            flex-grow: 1; overflow-y: auto; border-top: 1px solid var(--border-color);
            padding: 20px 0; display: flex; flex-direction: column; gap: 20px;
        }

        .message { line-height: 1.6; font-size: 0.9rem; animation: fadeIn 0.3s ease; }
        .kwen-label, .user-label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 4px; color: #555; }

        /* --- MARKDOWN ELEMENTS --- */
        h3 { font-size: 1rem; margin: 15px 0 5px 0; border-bottom: 1px solid #aaa; width: fit-content; }
        code.inline-code { background: #ccc; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
        .code-container {
            display: inline-block; min-width: 250px; max-width: 100%;
            background: var(--code-bg); color: #d4d4d4; padding: 30px 15px 12px 15px;
            border-radius: 4px; position: relative; font-family: 'Consolas', monospace; font-size: 0.8rem; margin: 10px 0;
        }
        .copy-btn { position: absolute; top: 6px; right: 8px; background: #444; color: #fff; border: none; padding: 2px 8px; font-size: 0.6rem; cursor: pointer; }

        .thought-container { border-left: 3px solid #999; margin: 10px 0; padding: 5px 15px; background: #d0d0d0; color: #444; font-size: 0.8rem; width: fit-content; }
        .thought-content { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .thought-content.expanded { display: block; -webkit-line-clamp: unset; }
        .show-more-btn { background: none; border: none; text-decoration: underline; cursor: pointer; font-size: 0.7rem; }

        .cursor { display: inline-block; background: #000; width: 8px; height: 1rem; vertical-align: middle; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .input-area { margin-top: 20px; display: flex; gap: 10px; }
        #user-input { flex-grow: 1; background: #fff; border: 1px solid var(--accent-box); padding: 12px; outline: none; font-family: inherit; }
        #send-btn { background: var(--accent-box); color: var(--accent-text); border: none; padding: 0 25px; cursor: pointer; font-family: inherit; font-weight: bold; }
    </style>
</head>
<body>

<aside id="sidebar">
    <button class="new-chat-btn" onclick="startNewChat()">+ NEW INSTRUCTION</button>
    <div id="history-list"></div>
</aside>

<main id="main-content">
    <div class="container">
        <h1><strong>KWEN</strong>_FOUNDATION</h1>
        <div><span class="highlight">MOD: 4B_REASON</span><span class="highlight">DB: ACTIVE</span></div>

        <div id="chat-window"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Enter logic request..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>
</main>

<script>
    const API_URL = "https://thekwenfoundation-kwen-api.hf.space/v1/chat"; 
    const DEFAULT_KEY = "kwen_NjdT7VQauEyDfzVvPLMIQfwUuduJWT6j";
    
    let currentChatId = Date.now();
    let chats = JSON.parse(localStorage.getItem('kwen_chats')) || {};

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const historyList = document.getElementById('history-list');

    function startNewChat() {
        currentChatId = Date.now();
        chatWindow.innerHTML = '<div class="message"><span class="kwen-label">Kwen:</span><span>New session established. Waiting for command.</span></div>';
        renderHistory();
    }

    function saveChat(role, text) {
        if (!chats[currentChatId]) chats[currentChatId] = [];
        chats[currentChatId].push({ role, text });
        localStorage.setItem('kwen_chats', JSON.stringify(chats));
        renderHistory();
    }

    function loadChat(id) {
        currentChatId = id;
        chatWindow.innerHTML = "";
        chats[id].forEach(msg => {
            appendMessageUI(msg.role, msg.text, false);
        });
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = "";
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const firstMsg = chats[id][0]?.text || "Empty Chat";
            const div = document.createElement('div');
            div.className = `history-item ${id == currentChatId ? 'active' : ''}`;
            div.innerText = firstMsg;
            div.onclick = () => loadChat(id);
            historyList.appendChild(div);
        });
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessageUI("User", text, true);
        userInput.value = "";
        
        const kwenDiv = appendMessageUI("Kwen", "", false);
        const contentSpan = kwenDiv.querySelector('span:last-child');
        contentSpan.innerHTML = '<span class="cursor">▋</span>';

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${DEFAULT_KEY}` },
                body: JSON.stringify({ prompt: text, max_tokens: 1024, temperature: 0.6 })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                fullText += decoder.decode(value, { stream: true });
                contentSpan.innerHTML = formatMarkdown(fullText) + '<span class="cursor">▋</span>';
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
            contentSpan.innerHTML = formatMarkdown(fullText);
            saveChat("Kwen", fullText);
        } catch (err) {
            contentSpan.innerText = "Error: " + err.message;
        }
    }

    function formatMarkdown(text) {
        let t = text;
        t = t.replace(/<think>([\s\S]*?)<\/think>/g, (m, c) => `<div class="thought-container"><div class="thought-content">${c.trim()}</div><button class="show-more-btn" onclick="this.previousElementSibling.classList.toggle('expanded')">Show More..</button></div>`);
        t = t.replace(/```(?:[a-z]*)\n([\s\S]*?)```/g, (m, c) => `<div class="code-container"><button class="copy-btn" onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText);this.innerText='DONE'">COPY</button><pre><code>${c.replace(/</g, "&lt;").trim()}</code></pre></div>`);
        t = t.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        t = t.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
        t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        t = t.replace(/^\d+\.\s+(.*)/gm, '<li>$1</li>');
        t = t.replace(/(<li>.*<\/li>)/s, (m) => m.includes('ol>') ? m : `<ol>${m}</ol>`);
        return t;
    }

    function appendMessageUI(sender, text, shouldSave) {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<span class="${sender.toLowerCase()}-label">${sender}:</span><span>${formatMarkdown(text)}</span>`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        if (shouldSave) saveChat(sender, text);
        return div;
    }

    document.getElementById('send-btn').onclick = handleSend;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
    renderHistory();
</script>

</body>
</html>
