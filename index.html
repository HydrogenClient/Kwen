<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwen</title>
    <style>
        :root {
            --bg-color: #e5e5e5;
            --text-color: #1a1a1a;
            --accent-box: #1a1a1a;
            --accent-text: #ffffff;
            --border-color: #d1d1d1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 40px; display: flex; justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }
        h1 { font-weight: normal; font-size: 1.5rem; margin-bottom: 2rem; }
        h1 strong { font-weight: 900; }
        .highlight { background-color: var(--accent-box); color: var(--accent-text); padding: 2px 6px; font-weight: bold; }

        #chat-window {
            margin-top: 2rem; height: 500px; overflow-y: auto;
            border-top: 1px solid var(--border-color);
            padding: 20px 0; display: flex; flex-direction: column; gap: 20px;
        }

        .message { white-space: pre-wrap; animation: fadeIn 0.3s ease; line-height: 1.5; }
        .kwen-label { font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
        .user-label { font-weight: bold; color: #000; display: block; margin-bottom: 4px; }

        .cursor {
            display: inline-block; background-color: var(--text-color);
            width: 10px; height: 1.2rem; margin-left: 4px;
            animation: blink 0.8s infinite; vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .input-area { margin-top: 20px; display: flex; gap: 10px; }
        #user-input {
            flex-grow: 1; background: transparent; border: 1px solid var(--text-color);
            padding: 12px; font-family: 'Courier New', Courier, monospace; font-size: 1rem; outline: none;
        }

        #send-btn {
            background: var(--accent-box); color: var(--accent-text);
            border: none; padding: 0 20px; cursor: pointer;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hello. I'm <strong>Kwen</strong>.</h1>
    <p>The <span class="highlight">Kwen Foundation</span><span class="highlight">Status: Online</span></p>

    <div id="chat-window">
        <div class="message">
            <span class="kwen-label">Kwen:</span>
            <span>FastAPI Stream Engine linked. Awaiting logic request...</span>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
        <button id="send-btn">SEND</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // CONFIG FROM YOUR BACKEND
    const API_URL = "https://thekwenfoundation-kwen-api.hf.space/v1/chat"; 
    const DEFAULT_KEY = "kwen_NjdT7VQauEyDfzVvPLMIQfwUuduJWT6j";

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage("User", text);
        userInput.value = "";
        
        const kwenDiv = appendMessage("Kwen", "");
        const content = kwenDiv.querySelector('.content');
        content.innerHTML = '<span class="cursor">▋</span>';

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${DEFAULT_KEY}` // Added your internal auth
                },
                body: JSON.stringify({ 
                    prompt: text,
                    max_tokens: 512,
                    temperature: 0.6
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            // HANDLING THE STREAM
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            content.innerText = ""; // Clear cursor to start stream

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                content.innerText += chunk; // Append tokens as they arrive
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
            
        } catch (err) {
            console.error(err);
            content.innerText = "System Error: " + err.message;
        }
    }

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<span class="${sender.toLowerCase()}-label">${sender}:</span><span class="content">${text}</span>`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
</script>

</body>
</html>
