<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kwen AI - Hydrogen Client</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body { background-color: #0f172a; color: white; margin: 0; }
.chat-container { height: calc(100vh - 160px); }
.user-msg { background: #3b82f6; align-self: flex-end; border-radius: 18px 18px 2px 18px; }
.ai-msg { background: #1e293b; align-self: flex-start; border-radius: 18px 18px 18px 2px; border: 1px solid #334155; }
#chatBox { scroll-behavior: smooth; }

    /* Markdown Code Formatting */
    code { background-color: #0f172a; padding: 2px 4px; border-radius: 4px; font-family: monospace; color: #f87171; }
    pre { background-color: #000; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; border: 1px solid #334155; }
    pre code { color: #fff; background: none; padding: 0; }
    strong { color: #60a5fa; }
    
    .typing::after {
        content: "▊";
        display: inline-block;
        margin-left: 3px;
        animation: blink 0.8s infinite;
        color: #3b82f6;
    }
    @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body class="flex flex-col h-screen max-w-5xl mx-auto p-4">

<header class="flex justify-between items-center pb-4 border-b border-slate-800">
<div class="flex items-center gap-2">
<h1 class="text-2xl font-black text-blue-500 tracking-tighter">KWEN</h1>
<span class="text-[10px] bg-blue-900/30 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20">540M</span>
</div>
<input type="password" id="apiKey" placeholder="Enter your API Key"
class="bg-slate-900 border border-slate-700 px-3 py-1 rounded text-sm w-60 focus:border-blue-500 outline-none transition-all">
</header>

<div id="chatBox" class="chat-container overflow-y-auto flex flex-col gap-4 py-6 px-2">
<div class="ai-msg px-4 py-3 max-w-[80%] shadow-lg">
How can i help you today?
</div>
</div>

<div class="relative mt-auto">
<input type="text" id="userInput" placeholder="Ask anything..."
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-5 py-4 pr-16 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
<button id="sendBtn" class="absolute right-3 top-2.5 p-2 bg-blue-600 hover:bg-blue-500 rounded-lg transition-colors">
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
</svg>
</button>
</div>

<script>
const API_URL = "https://thekwenfoundation-kwen-api.hf.space/v1/chat";
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const apiKeyInput = document.getElementById('apiKey');

apiKeyInput.value = localStorage.getItem('kwen_key') || "";

function addMessage(text, isUser) {
const msgDiv = document.createElement('div');
msgDiv.className = px-4 py-3 max-w-[85%] ${isUser ? &#39;user-msg whitespace-pre-wrap&#39; : &#39;ai-msg&#39;};
// Initialize AI messages with innerHTML for Markdown
msgDiv.innerHTML = isUser ? text : marked.parse(text);
chatBox.appendChild(msgDiv);
chatBox.scrollTop = chatBox.scrollHeight;
return msgDiv;
}

async function sendMessage() {
const prompt = userInput.value.trim();
const key = apiKeyInput.value.trim();

if (!prompt) return;
if (!key) {
    alert(&quot;Authorization required: Please enter your Kwen API Key.&quot;);
    return;
}

localStorage.setItem(&#39;kwen_key&#39;, key);
addMessage(prompt, true);
userInput.value = &quot;&quot;;

const aiMessageBubble = addMessage(&quot;&quot;, false);
aiMessageBubble.classList.add(&quot;typing&quot;);

try {
    const response = await fetch(API_URL, {
        method: &#39;POST&#39;,
        headers: {
            &#39;Content-Type&#39;: &#39;application/json&#39;,
            &#39;Authorization&#39;: `Bearer ${key}`
        },
        body: JSON.stringify({ prompt: prompt })
    });

    if (!response.ok) {
        aiMessageBubble.classList.remove(&quot;typing&quot;);
        aiMessageBubble.textContent = &quot;Error: Check your API Key.&quot;;
        return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = &quot;&quot;;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        fullText += chunk;
        
        // Convert current text to HTML using marked
        aiMessageBubble.innerHTML = marked.parse(fullText);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

} catch (error) {
    aiMessageBubble.textContent = &quot;Network Error.&quot;;
} finally {
    aiMessageBubble.classList.remove(&quot;typing&quot;);
}
}

sendBtn.onclick = sendMessage;
userInput.onkeypress = (e) => {
if (e.key === "Enter" && !e.shiftKey) {
e.preventDefault();
sendMessage();
}
};
</script>

</body>
</html>
