<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwen API Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .kwen-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight">Kwen <span class="text-blue-500">Foundation</span></h1>
            <p class="text-slate-400 mt-2">API Management Dashboard</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                <input type="text" id="userField" placeholder="Enter your name" 
                    class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>

            <button id="genBtn" class="kwen-gradient w-full py-3 rounded-lg font-bold hover:opacity-90 transition-opacity flex justify-center items-center">
                <span>Generate New API Key</span>
            </button>
        </div>

        <div id="resultCard" class="mt-8 hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="p-4 rounded-lg bg-slate-900 border border-blue-500/30">
                <p class="text-xs font-semibold text-blue-400 uppercase tracking-wider mb-2">Your API Key</p>
                <div class="flex items-center justify-between gap-2">
                    <code id="keyDisplay" class="text-sm font-mono text-slate-100 break-all"></code>
                    <button onclick="copyKey()" class="p-2 hover:bg-slate-800 rounded-md transition-colors" title="Copy Key">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                        </svg>
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-slate-500 mt-3 text-center italic">
                Note: This key is stored in volatile memory. If the Space restarts, generate a new one.
            </p>
        </div>
    </div>

    <script>
        const API_URL = "https://thekwenfoundation-kwen-api.hf.space";
        const genBtn = document.getElementById('genBtn');
        const userField = document.getElementById('userField');
        const resultCard = document.getElementById('resultCard');
        const keyDisplay = document.getElementById('keyDisplay');

        genBtn.onclick = async () => {
            const user = userField.value.trim();
            if(!user) return alert("Please enter a username first.");

            // UI Loading State
            genBtn.disabled = true;
            genBtn.innerText = "Processing...";

            try {
                const res = await fetch(`${API_URL}/admin/generate_key?username=${encodeURIComponent(user)}`, {
                    method: 'POST'
                });

                if (res.ok) {
                    const data = await res.json();
                    keyDisplay.innerText = data.key;
                    resultCard.classList.remove('hidden');
                } else {
                    alert("Error: API refused connection. Ensure your Space is running.");
                }
            } catch (e) {
                alert("Connection failed. Check if CORS is enabled on the Hugging Face Space.");
            } finally {
                genBtn.disabled = false;
                genBtn.innerText = "Generate New API Key";
            }
        };

        function copyKey() {
            const key = keyDisplay.innerText;
            navigator.clipboard.writeText(key);
            alert("Key copied to clipboard!");
        }
    </script>
</body>
</html>
